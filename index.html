  const eventSubmitBtn = document.getElementById('event-submit-btn');
  const eventCancelEditBtn = document.getElementById('event-cancel-edit-btn');
  const eventYearInput = document.getElementById('event-year');
  const eventDescInput = document.getElementById('event-desc');
  const eventEvidenceInput = document.getElementById('event-evidence');

  let currentEditPersonId = null;
  let editingEventId = null; // set while the event form is editing an existing event rather than adding a new one

  function startEditingEvent(ev){
    editingEventId = ev.id;
    eventYearInput.value = ev.year;
    eventDescInput.value = ev.description || '';
    eventEvidenceInput.value = ev.evidence || '';
    eventSubmitBtn.textContent = 'Save changes';
    eventCancelEditBtn.classList.add('show');
    eventYearInput.focus();
  }

  function stopEditingEvent(){
    editingEventId = null;
    editEventForm.reset();
    eventSubmitBtn.textContent = '+ Add event';
    eventCancelEditBtn.classList.remove('show');
  }

  eventCancelEditBtn.addEventListener('click', stopEditingEvent);

  function relationDescription(link, personId){
    const otherId = link.source === personId ? link.target : link.source;
    const other = nodeById(otherId);
    const otherName = other ? other.name : '(unknown person)';

    if (link.type === 'parent'){
      return link.source === personId
        ? `Parent of ${otherName}`
        : `Child of ${otherName}`;
    }
    if (link.type === 'spouse') return `Spouse of ${otherName}`;
    if (link.type === 'sibling') return `Sibling of ${otherName}`;
    return `Linked to ${otherName}`;
  }

  function renderEditRelationsList(){
    if (!currentEditPersonId) return;
    const relevant = links.filter(l => l.source === currentEditPersonId || l.target === currentEditPersonId);
    editRelationsList.innerHTML = '';
    if (!relevant.length){
      editRelationsList.innerHTML = '<div class="edit-list-empty">No relations yet.</div>';
      return;
    }
    relevant.forEach(l => {
      const row = document.createElement('div');
      row.className = 'edit-list-item';
      const main = document.createElement('div');
      main.className = 'item-main';
      main.textContent = relationDescription(l, currentEditPersonId);
      const removeBtn = document.createElement('button');
      removeBtn.className = 'item-remove';
      removeBtn.textContent = '\u2715';
      removeBtn.title = 'Remove this relation';
      removeBtn.addEventListener('click', () => {
        deleteDoc(doc(linksCol, l.id)).catch(err => console.error('Failed to remove relation', err));
      });
      row.appendChild(main);
      row.appendChild(removeBtn);
      editRelationsList.appendChild(row);
    });
  }

  function renderEditEventsList(){
    if (!currentEditPersonId) return;
    const personEvents = eventsForPerson(currentEditPersonId);
    editEventsList.innerHTML = '';
    if (!personEvents.length){
      editEventsList.innerHTML = '<div class="edit-list-empty">No life events recorded yet.</div>';
      return;
    }
    personEvents.forEach(ev => {
      const row = document.createElement('div');
      row.className = 'edit-list-item';
      const main = document.createElement('div');
      main.className = 'item-main';
      const yearSpan = document.createElement('span');
      yearSpan.className = 'item-year';
      yearSpan.textContent = ev.year;
      main.appendChild(yearSpan);
      main.appendChild(document.createTextNode(ev.description || ''));
      if (ev.evidence){
        const sub = document.createElement('div');
        sub.className = 'item-sub';
        sub.textContent = ev.evidence;
        main.appendChild(sub);
      }
      const editBtn = document.createElement('button');
      editBtn.className = 'item-edit';
      editBtn.textContent = '\u270e';
      editBtn.title = 'Edit this event';
      editBtn.addEventListener('click', () => startEditingEvent(ev));

      const removeBtn = document.createElement('button');
      removeBtn.className = 'item-remove';
      removeBtn.textContent = '\u2715';
      removeBtn.title = 'Remove this event';
      removeBtn.addEventListener('click', () => {
        deleteDoc(doc(eventsCol, ev.id)).catch(err => console.error('Failed to remove event', err));
        if (editingEventId === ev.id) stopEditingEvent();
      });

      const actions = document.createElement('div');
      actions.className = 'item-actions';
      actions.appendChild(editBtn);
      actions.appendChild(removeBtn);

      row.appendChild(main);
      row.appendChild(actions);
      editEventsList.appendChild(row);
    });
  }

  function openEditModal(personId){
    const person = nodeById(personId);
    if (!person) return;
    currentEditPersonId = personId;

    editPersonNameLabel.textContent = person.name;
    editNameInput.value = person.name || '';
    editMaidenInput.value = person.maidenName || '';
    editBirthInput.value = person.birth || '';
    editDeathInput.value = person.death || '';
    editBirthplaceInput.value = person.birthPlace || '';
    editGenderInput.value = person.gender || 'u';
    editSaveConfirm.classList.remove('show');
    stopEditingEvent(); // in case the modal was left mid-edit last time

    renderEditRelationsList();
    renderEditEventsList();

    editOverlay.classList.add('open');
  }

  function closeEditModal(){
    editOverlay.classList.remove('open');
    const id = currentEditPersonId;
    currentEditPersonId = null;
    // Return to the timeline so newly added events/dates are visible right away.
    if (id) openTimelineModal(id);
  }

  document.getElementById('edit-close').addEventListener('click', closeEditModal);
  editOverlay.addEventListener('click', (e) => { if (e.target === editOverlay) closeEditModal(); });

  editSaveBasicBtn.addEventListener('click', async () => {
    if (!currentEditPersonId) return;
    const name = editNameInput.value.trim();
    if (!name) return;
    const maidenName = editMaidenInput.value.trim();
    const birth = editBirthInput.value ? Number(editBirthInput.value) : null;
    const death = editDeathInput.value ? Number(editDeathInput.value) : null;
    const birthPlace = editBirthplaceInput.value.trim();
    const gender = editGenderInput.value;
    try {
      await updateDoc(doc(peopleCol, currentEditPersonId), {
        name, birth, death, gender,
        maidenName: maidenName || null,
        birthPlace: birthPlace || null
      });
      editPersonNameLabel.textContent = name;
      editSaveConfirm.classList.add('show');
      setTimeout(() => editSaveConfirm.classList.remove('show'), 1800);
    } catch (err){
      console.error('Failed to save person info', err);
    }
  });

  editAddRelationBtn.addEventListener('click', () => {
    if (!currentEditPersonId) return;
    reopenEditAfterModal = currentEditPersonId;
    editOverlay.classList.remove('open');
    openModal(currentEditPersonId);
  });

  editEventForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!currentEditPersonId) return;
    const year = eventYearInput.value;
    const description = eventDescInput.value.trim();
    const evidence = eventEvidenceInput.value.trim();
    if (!year || !description) return;
    try {
      if (editingEventId){
        await updateDoc(doc(eventsCol, editingEventId), {
          year: Number(year),
          description,
          evidence
        });
        stopEditingEvent();
      } else {
        await setDoc(doc(eventsCol), {
          personId: currentEditPersonId,
          year: Number(year),
          description,
          evidence,
          createdAt: Date.now()
        });
        editEventForm.reset();
      }
    } catch (err){
      console.error('Failed to save event', err);
    }
  });

  // ---------- Modal ----------
  const nameInput = document.getElementById('p-name');
  const suggestionsEl = document.getElementById('name-suggestions');
  const existingNoteEl = document.getElementById('existing-note');
  const birthInput = document.getElementById('p-birth');
  const deathInput = document.getElementById('p-death');
  const genderInput = document.getElementById('p-gender');
  const maidenInput = document.getElementById('p-maiden');
  const birthplaceInput = document.getElementById('p-birthplace');

  let selectedExistingId = null; // set when the user picks a suggestion instead of typing a new person

  function linkExists(sourceId, targetId, type){
    return links.some(l => l.type === type && (
      (l.source === sourceId && l.target === targetId) ||
      // spouse/sibling links are symmetric, so check both directions
      (type !== 'parent' && l.source === targetId && l.target === sourceId)
    ));
  }

  function lockToExisting(node){
    selectedExistingId = node.id;
    nameInput.value = node.name;
    suggestionsEl.classList.remove('open');
    suggestionsEl.innerHTML = '';
    existingNoteEl.classList.add('open');
    birthInput.disabled = true;
    deathInput.disabled = true;
    genderInput.disabled = true;
    maidenInput.disabled = true;
    birthplaceInput.disabled = true;
  }

  function unlockExisting(){
    selectedExistingId = null;
    existingNoteEl.classList.remove('open');
    birthInput.disabled = false;
    deathInput.disabled = false;
    genderInput.disabled = false;
    maidenInput.disabled = false;
    birthplaceInput.disabled = false;
  }

  function updateSuggestions(){
    const q = nameInput.value.trim().toLowerCase();
    suggestionsEl.innerHTML = '';
    if (!q){ suggestionsEl.classList.remove('open'); return; }
    const matches = nodes
      .filter(n => n.id !== pendingSourceId &&
        (n.name.toLowerCase().includes(q) || (n.maidenName && n.maidenName.toLowerCase().includes(q))))
      .slice(0, 6);
    if (!matches.length){ suggestionsEl.classList.remove('open'); return; }
    matches.forEach(m => {
      const item = document.createElement('div');
      item.className = 'suggestion-item';
      const dates = (m.birth || m.death) ? `${m.birth || '?'}\u2013${m.death || 'living'}` : '';
      const maiden = m.maidenName ? ` (n\u00e9e ${m.maidenName})` : '';
      item.innerHTML = `${escapeHtml(m.name)}${escapeHtml(maiden)}${dates ? `<span class="s-dates">${escapeHtml(dates)}</span>` : ''}`;
      item.addEventListener('click', () => lockToExisting(m));
      suggestionsEl.appendChild(item);
    });
    suggestionsEl.classList.add('open');
  }

  nameInput.addEventListener('input', () => {
    if (selectedExistingId) unlockExisting();
    updateSuggestions();
  });
  document.getElementById('clear-existing').addEventListener('click', (e) => {
    e.preventDefault();
    unlockExisting();
    nameInput.value = '';
    nameInput.focus();
  });
  document.addEventListener('click', (e) => {
    if (e.target !== nameInput && !e.target.closest('#name-suggestions')){
      suggestionsEl.classList.remove('open');
    }
  });

  function openModal(sourceId){
    pendingSourceId = sourceId;
    if (sourceId === null){
      modalTitle.textContent = 'Add the first person';
      relationField.style.display = 'none';
    } else {
      const src = nodeById(sourceId);
      modalTitle.textContent = 'Add relative of ' + (src ? src.name : '');
      relationField.style.display = 'block';
    }
    form.reset();
    unlockExisting();
    suggestionsEl.classList.remove('open');
    overlay.classList.add('open');
    nameInput.focus();
  }
  let reopenEditAfterModal = null; // personId to return to the edit modal for, or null

  function closeModal(){
    overlay.classList.remove('open');
    pendingSourceId = null;
    if (reopenEditAfterModal){
      const id = reopenEditAfterModal;
      reopenEditAfterModal = null;
      openEditModal(id);
    }
  }

  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  ghostCard.addEventListener('click', () => openModal(null));

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    if (!name) return;
    const relation = relationSelect.value;
    const src = pendingSourceId !== null ? nodeById(pendingSourceId) : null;

    let targetId = selectedExistingId;
    let targetX, targetY;

    try {
      if (!targetId){
        // Creating a brand new person
        const birth = birthInput.value;
        const death = deathInput.value;
        const gender = genderInput.value;
        const maidenName = maidenInput.value.trim();
        const birthPlace = birthplaceInput.value.trim();

        let x, y;
        if (src){
          const off = OFFSETS[relation];
          const jitterX = (Math.random() * 30 - 15);
          const jitterY = (Math.random() * 30 - 15);
          x = clamp(src.x + off.dx + jitterX, CARD_W, WORLD_W - CARD_W);
          y = clamp(src.y + off.dy + jitterY, CARD_H, WORLD_H - CARD_H);
        } else {
          x = CENTER_X; y = CENTER_Y;
        }

        const newRef = doc(peopleCol);
        targetId = newRef.id;
        targetX = x; targetY = y;
        await setDoc(newRef, {
          name,
          birth: birth ? Number(birth) : null,
          death: death ? Number(death) : null,
          gender,
          maidenName: maidenName || null,
          birthPlace: birthPlace || null,
          rotation: (Math.random() * 6 - 3),
          x, y
        });
      } else {
        const existing = nodeById(targetId);
        targetX = existing ? existing.x : CENTER_X;
        targetY = existing ? existing.y : CENTER_Y;
      }

      if (src && targetId !== src.id){
        const addLink = async (s, t, type) => {
          if (linkExists(s, t, type)) return;
          await setDoc(doc(linksCol), { source: s, target: t, type });
        };

        if (relation === 'parent'){
          await addLink(targetId, src.id, 'parent');
        } else if (relation === 'child'){
          await addLink(src.id, targetId, 'parent');
        } else if (relation === 'spouse'){
          await addLink(src.id, targetId, 'spouse');
        } else if (relation === 'sibling'){
          const parentIds = links
            .filter(l => l.type === 'parent' && l.target === src.id)
            .map(l => l.source);
          if (parentIds.length){
            for (const pid of parentIds) await addLink(pid, targetId, 'parent');
          } else {
            await addLink(src.id, targetId, 'sibling');
          }
        }
      }

      closeModal();
      centerOn(targetX, targetY);
    } catch (err){
      console.error('Failed to save to Firestore', err);
      setSyncStatus('error', 'Save failed — check connection');
    }
  });

  // ---------- Firestore sync ----------
  function setSyncStatus(state, label){
    syncStatusEl.className = 'sync-status ' + state;
    syncLabelEl.textContent = label;
  }

  function startSync(){
    onSnapshot(peopleCol, (snap) => {
      nodes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // Remember the real saved positions (pre-override) so "Manual" can
      // restore to them later without needing another round trip.
      nodes.forEach(n => { savedPositions[n.id] = { x: n.x, y: n.y }; });
      // Drop overrides for anyone no longer on the board, then reapply
      // whatever's left on top of the freshly-synced positions.
      const currentIds = new Set(nodes.map(n => n.id));
      Object.keys(localPositionOverrides).forEach(id => {
        if (!currentIds.has(id)) delete localPositionOverrides[id];
      });
      Object.keys(savedPositions).forEach(id => {
        if (!currentIds.has(id)) delete savedPositions[id];
      });
      applyLocalOverrides();
      renderAll();
      setSyncStatus('synced', 'Synced');
    }, (err) => {
      console.error('People sync error', err);
      setSyncStatus('error', 'Sync error — check Firestore rules');
    });

    onSnapshot(linksCol, (snap) => {
      links = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
      if (editOverlay.classList.contains('open')) renderEditRelationsList();
      setSyncStatus('synced', 'Synced');
    }, (err) => {
      console.error('Links sync error', err);
      setSyncStatus('error', 'Sync error — check Firestore rules');
    });

    onSnapshot(eventsCol, (snap) => {
      events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (editOverlay.classList.contains('open')) renderEditEventsList();
      if (timelineOverlay.classList.contains('open') && currentTimelinePersonId){
        openTimelineModal(currentTimelinePersonId);
      }
      setSyncStatus('synced', 'Synced');
    }, (err) => {
      console.error('Events sync error', err);
      setSyncStatus('error', 'Sync error — check Firestore rules');
    });
  }

  // ---------- Init ----------
  attachPan();
  attachZoom();
  attachTouch();
  ghostCard.style.left = (CENTER_X - 85) + 'px';
  ghostCard.style.top = (CENTER_Y - 60) + 'px';
  camX = canvasEl.clientWidth / 2 - CENTER_X * camScale;
  camY = canvasEl.clientHeight / 2 - CENTER_Y * camScale;
  applyCamera();
  renderAll(); // show ghost card immediately, don't wait on the network

  setSyncStatus('connecting', 'Connecting...');
  onAuthStateChanged(auth, (user) => {
    if (user) startSync();
  });
  signInAnonymously(auth).catch(err => {
    console.error('Anonymous sign-in failed', err);
    setSyncStatus('error', 'Sign-in failed — see console');
  });

})();
</script>
</body>
</html>
