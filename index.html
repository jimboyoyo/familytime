<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --board-bg-1:#c8b184;
    --card-bg:#f6efd9;
    --card-bg-edge:#e9dfc0;
    --ink:#2c2620;
    --ink-soft:#6b6255;
    --pin:#7c2f2f;
    --pin-highlight:#a84a4a;
    --thread-parent:#5c4326;
    --thread-spouse:#a23636;
    --thread-sibling:#33507e;
    --accent:#8a6a34;
    --accent-dark:#6e5427;
    --panel-bg:#26221c;
    --panel-ink:#e8dfc9;
    --font-display:'Special Elite', cursive;
    --font-body:'Courier Prime', monospace;
    --font-ui:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:var(--font-ui);}

  #toolbar{
    position:fixed; top:0; left:0; right:0; height:56px;
    background:var(--panel-bg); color:var(--panel-ink);
    display:flex; align-items:center; padding:0 20px; gap:24px;
    z-index:10; box-shadow:0 2px 8px rgba(0,0,0,0.3);
  }
  #toolbar .title{ font-family:var(--font-display); font-size:19px; letter-spacing:1px; }
  #toolbar .count{ margin-left:auto; font-size:12px; color:#b8ad95; }
  .arrange-select{
    background:var(--panel-bg);
    color:var(--panel-ink);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:4px;
    font-family:var(--font-ui);
    font-size:12px;
    padding:5px 8px;
    cursor:pointer;
  }
  .arrange-select:hover{ border-color:rgba(255,255,255,0.5); }
  .arrange-select:focus{ outline:none; border-color:var(--accent); }

  .toolbar-btn{
    background:transparent;
    color:var(--panel-ink);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:4px;
    font-family:var(--font-ui);
    font-size:12px;
    padding:6px 10px;
    cursor:pointer;
  }
  .toolbar-btn:hover{ border-color:rgba(255,255,255,0.6); }
  .toolbar-btn.active{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }

  .tracking-hint{
    display:none;
    font-size:11px;
    color:#cfc4a8;
    font-style:italic;
  }
  .tracking-hint.show{ display:inline; }

  .sync-status{
    display:flex; align-items:center; gap:6px;
    font-size:11px; color:#b8ad95;
  }
  .sync-dot{
    width:8px; height:8px; border-radius:50%;
    background:#8a8478;
    transition:background 0.2s ease;
  }
  .sync-status.connecting .sync-dot{ background:#c9a227; }
  .sync-status.synced .sync-dot{ background:#4a8a4a; }
  .sync-status.error .sync-dot{ background:#a23636; }
  .legend{ display:flex; gap:16px; font-size:11px; color:#cfc4a8; }
  .legend-item{ display:flex; align-items:center; gap:6px; }
  .legend-swatch{ width:18px; height:2.5px; border-radius:2px; }

  #canvas{
    position:fixed;
    top:56px; left:0; right:0; bottom:0;
    overflow:hidden;
    cursor:grab;
    touch-action:none;
    background-color:var(--board-bg-1);
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 2px, transparent 2px, transparent 6px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.035) 0px, rgba(0,0,0,0.035) 2px, transparent 2px, transparent 6px);
  }
  #canvas.panning{ cursor:grabbing; }

  #world{
    position:relative;
    width:4000px;
    height:3000px;
    transform-origin:0 0;
  }
  #world.smooth{ transition:transform 0.18s ease-out; }

  #links-svg{
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
  }
  .thread{ fill:none; stroke-width:2.2; opacity:0.85; }
  .thread-parent{ stroke:var(--thread-parent); }
  .thread-spouse{ stroke:var(--thread-spouse); stroke-width:2.6; }
  .thread-sibling{ stroke:var(--thread-sibling); stroke-dasharray:5,4; }
  .thread-lineage{ stroke:#c9a227 !important; stroke-width:4 !important; opacity:1 !important; }
  .thread-dim{ opacity:0.1 !important; }

  .link-tag{
    position:absolute;
    transform:translate(-50%, -50%);
    background:var(--card-bg);
    border:1px solid rgba(0,0,0,0.28);
    border-radius:3px;
    padding:2px 7px;
    font-family:var(--font-body);
    font-size:10px;
    text-transform:capitalize;
    color:var(--ink);
    white-space:nowrap;
    box-shadow:1px 2px 4px rgba(0,0,0,0.3);
    pointer-events:none;
  }

  .card{
    position:absolute;
    width:150px; min-height:80px;
    background:linear-gradient(180deg, var(--card-bg), var(--card-bg-edge));
    border:1px solid rgba(0,0,0,0.25);
    border-radius:2px;
    padding:14px 10px 10px 10px;
    box-shadow:2px 4px 10px rgba(0,0,0,0.35);
    cursor:grab;
    user-select:none;
    text-align:center;
  }
  .card.dragging{ cursor:grabbing; box-shadow:3px 8px 18px rgba(0,0,0,0.5); z-index:5; }
  .card.lineage-root{ box-shadow:0 0 0 3px var(--accent), 3px 6px 14px rgba(0,0,0,0.4); z-index:6; }
  .card.lineage-ancestor{ box-shadow:0 0 0 3px #c9a227, 3px 6px 14px rgba(0,0,0,0.4); z-index:5; }
  .card.lineage-dim{ opacity:0.22; }

  .pin{
    position:absolute; top:-7px; left:50%; transform:translateX(-50%);
    width:13px; height:13px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--pin-highlight), var(--pin));
    box-shadow:0 2px 3px rgba(0,0,0,0.5);
  }
  .card .name{ font-family:var(--font-display); font-size:15px; color:var(--ink); line-height:1.25; word-break:break-word; }
  .card .dates{ font-family:var(--font-body); font-size:11px; color:var(--ink-soft); margin-top:4px; }
  .card .maiden{ font-family:var(--font-body); font-size:10px; font-style:italic; color:var(--ink-soft); margin-top:2px; }
  .label-optional{ text-transform:none; letter-spacing:0; font-style:italic; }
  .card .gender-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:middle; }

  .add-btn{
    position:absolute; bottom:-12px; right:-12px;
    width:26px; height:26px; border-radius:50%;
    background:var(--accent); border:2px solid var(--card-bg); color:#fff;
    font-size:16px; font-weight:600; line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.4);
  }
  .add-btn:hover{ background:var(--accent-dark); }

  #ghost-card{
    position:absolute;
    width:170px; padding:22px 14px; text-align:center;
    border:2px dashed rgba(0,0,0,0.4); border-radius:4px;
    background:rgba(255,255,255,0.15);
    color:var(--ink); font-family:var(--font-ui); font-size:13px;
    cursor:pointer;
  }
  #ghost-card .plus{ display:block; font-size:30px; line-height:1; margin-bottom:8px; font-weight:300; }
  #ghost-card:hover{ background:rgba(255,255,255,0.28); }

  #overlay{
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(20,17,12,0.55);
    display:none; align-items:center; justify-content:center;
    z-index:20;
  }
  #overlay.open{ display:flex; }
  #modal{
    width:320px; background:var(--card-bg); border-radius:4px;
    padding:22px 22px 18px; box-shadow:0 12px 30px rgba(0,0,0,0.5);
    font-family:var(--font-ui); color:var(--ink);
  }
  #modal h2{ font-family:var(--font-display); font-size:17px; margin:0 0 14px; }
  #modal label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); margin:12px 0 4px; }
  #modal input, #modal select{
    width:100%; padding:7px 8px; font-family:var(--font-ui); font-size:13px;
    border:1px solid rgba(0,0,0,0.3); border-radius:3px; background:#fffdf6;
  }
  .modal-row{ display:flex; gap:10px; }
  .modal-row > div{ flex:1; }

  .suggestions{
    display:none;
    margin-top:2px;
    border:1px solid rgba(0,0,0,0.25);
    border-radius:3px;
    background:#fffdf6;
    max-height:150px;
    overflow-y:auto;
  }
  .suggestions.open{ display:block; }
  .suggestion-item{
    padding:6px 9px;
    font-size:13px;
    font-family:var(--font-ui);
    cursor:pointer;
    border-bottom:1px solid rgba(0,0,0,0.08);
  }
  .suggestion-item:last-child{ border-bottom:none; }
  .suggestion-item:hover{ background:#eee2c2; }
  .suggestion-item .s-dates{ color:var(--ink-soft); font-size:11px; margin-left:5px; }

  .existing-note{
    display:none;
    margin-top:8px;
    font-size:11px;
    line-height:1.5;
    color:var(--ink-soft);
    background:#eee2c2;
    padding:7px 9px;
    border-radius:3px;
  }
  .existing-note a{ color:var(--accent-dark); font-weight:600; }
  .existing-note.open{ display:block; }
  #modal .actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
  #modal button{ font-family:var(--font-ui); font-size:13px; padding:8px 16px; border-radius:3px; border:none; cursor:pointer; }
  #modal .btn-cancel{ background:transparent; color:var(--ink-soft); }
  #modal .btn-submit{ background:var(--accent); color:#fff; font-weight:600; }
  #modal .btn-submit:hover{ background:var(--accent-dark); }

  /* ---------- Timeline modal ---------- */
  #timeline-overlay{
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(20,17,12,0.55);
    display:none; align-items:center; justify-content:center;
    z-index:20;
  }
  #timeline-overlay.open{ display:flex; }
  #timeline-modal{
    width:560px; max-width:92vw;
    max-height:78vh;
    background:var(--card-bg);
    border-radius:4px;
    box-shadow:0 12px 30px rgba(0,0,0,0.5);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .timeline-header{
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:18px 20px 14px;
    border-bottom:2px solid rgba(0,0,0,0.15);
    background:var(--card-bg-edge);
  }
  .timeline-header h2{
    font-family:var(--font-display); font-size:19px; margin:0 0 4px; color:var(--ink);
  }
  .timeline-dates{
    font-family:var(--font-body); font-size:12px; color:var(--ink-soft);
  }
  #timeline-close{
    background:none; border:none; font-size:24px; line-height:1;
    color:var(--ink-soft); cursor:pointer; padding:0 4px;
  }
  #timeline-close:hover{ color:var(--ink); }
  .timeline-header-actions{ display:flex; align-items:center; gap:4px; }
  .icon-btn{
    background:none; border:none; font-size:19px; line-height:1;
    color:var(--ink-soft); cursor:pointer; padding:2px 6px;
    border-radius:3px;
  }
  .icon-btn:hover{ color:var(--ink); background:rgba(0,0,0,0.06); }
  #timeline-close, #edit-close{ font-size:24px; }

  #timeline-body{ overflow-y:auto; }
  #timeline-table{ width:100%; table-layout:fixed; border-collapse:collapse; font-family:var(--font-ui); font-size:13px; }
  #timeline-table th:nth-child(1), #timeline-table td:nth-child(1){ width:66px; }
  #timeline-table th:nth-child(2), #timeline-table td:nth-child(2){ width:56%; }
  #timeline-table th:nth-child(3), #timeline-table td:nth-child(3){ width:auto; }
  #timeline-table thead th{
    position:sticky; top:0;
    background:var(--card-bg-edge);
    text-align:left;
    font-size:10px; text-transform:uppercase; letter-spacing:0.6px;
    color:var(--ink-soft);
    padding:8px 16px;
    border-bottom:1px solid rgba(0,0,0,0.2);
  }
  #timeline-table td{
    padding:7px 16px;
    border-bottom:1px solid rgba(0,0,0,0.07);
    vertical-align:top;
  }
  #timeline-table td.tl-year{
    font-family:var(--font-body); font-weight:700; color:var(--ink);
    white-space:nowrap; width:64px;
  }
  #timeline-table td.tl-year .tl-year-value{ font-size:14px; }
  #timeline-table td.tl-year .tl-year-age{
    font-weight:400; font-size:10px; color:var(--ink-soft); margin-top:1px;
  }
  #timeline-table td.tl-event{ color:var(--ink-soft); font-style:italic; word-wrap:break-word; }
  #timeline-table td.tl-evidence{ color:var(--ink-soft); word-wrap:break-word; }
  #timeline-table td.tl-evidence a{ color:var(--accent-dark); text-decoration:underline; }
  #timeline-table td.tl-evidence a:hover{ color:var(--accent); }
  #timeline-table tbody tr:nth-child(even){ background:rgba(0,0,0,0.025); }
  #timeline-table tbody tr:hover{ background:rgba(138,106,52,0.09); }

  .timeline-empty-note{
    display:none;
    padding:26px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    line-height:1.6;
  }

  /* ---------- Edit person modal ---------- */
  #edit-overlay{
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(20,17,12,0.55);
    display:none; align-items:center; justify-content:center;
    z-index:21;
  }
  #edit-overlay.open{ display:flex; }
  #edit-modal{
    width:460px; max-width:92vw;
    max-height:85vh;
    background:var(--card-bg);
    border-radius:4px;
    box-shadow:0 12px 30px rgba(0,0,0,0.5);
    display:flex; flex-direction:column;
    overflow:hidden;
    font-family:var(--font-ui);
    color:var(--ink);
  }
  #edit-modal .timeline-header{ background:var(--card-bg-edge); }
  #edit-modal .timeline-header h2{ font-size:17px; }
  #edit-body{ overflow-y:auto; padding:4px 20px 20px; }

  .edit-section{ padding:16px 0; border-bottom:1px solid rgba(0,0,0,0.12); }
  .edit-section:last-child{ border-bottom:none; }
  .edit-section h3{
    font-family:var(--font-display); font-size:14px; margin:0 0 10px;
    color:var(--ink); letter-spacing:0.3px;
  }
  .edit-section label{
    display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--ink-soft); margin:10px 0 4px;
  }
  .edit-section label:first-of-type{ margin-top:0; }
  .edit-section input, .edit-section select{
    width:100%; padding:7px 8px; font-family:var(--font-ui); font-size:13px;
    border:1px solid rgba(0,0,0,0.3); border-radius:3px; background:#fffdf6;
  }
  .edit-save-btn{ margin-top:14px; }
  .edit-save-confirm{
    display:none;
    margin-left:10px; font-size:12px; color:#4a8a4a; font-weight:600;
  }
  .edit-save-confirm.show{ display:inline-block; }

  .btn-secondary{
    font-family:var(--font-ui); font-size:12px; font-weight:600;
    padding:7px 12px; border-radius:3px; border:1px solid var(--accent);
    background:transparent; color:var(--accent-dark); cursor:pointer;
    margin-top:8px;
  }
  .btn-secondary:hover{ background:rgba(138,106,52,0.1); }

  .event-form-actions{ display:flex; align-items:center; gap:10px; }
  .event-form-actions .btn-secondary{ margin-top:8px; }
  .btn-cancel-edit{
    display:none;
    background:none; border:none; color:var(--ink-soft);
    font-family:var(--font-ui); font-size:12px; text-decoration:underline;
    cursor:pointer; padding:0;
  }
  .btn-cancel-edit.show{ display:inline; }
  .btn-cancel-edit:hover{ color:var(--ink); }

  .edit-list{ display:flex; flex-direction:column; gap:6px; }
  .edit-list-empty{ font-size:12px; color:var(--ink-soft); font-style:italic; padding:2px 0; }
  .edit-list-item{
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:10px;
    background:#fffdf6;
    border:1px solid rgba(0,0,0,0.15);
    border-radius:3px;
    padding:7px 10px;
    font-size:13px;
  }
  .edit-list-item .item-main{ flex:1; }
  .edit-list-item .item-year{ font-family:var(--font-body); font-weight:700; margin-right:6px; }
  .edit-list-item .item-sub{ color:var(--ink-soft); font-size:11px; margin-top:2px; }
  .item-actions{ display:flex; gap:4px; flex-shrink:0; }
  .item-edit{
    background:none; border:none; color:var(--accent-dark);
    font-size:13px; line-height:1; cursor:pointer; padding:0 2px;
  }
  .item-edit:hover{ color:var(--accent); }
  .item-remove{
    background:none; border:none; color:var(--thread-spouse);
    font-size:15px; line-height:1; cursor:pointer; padding:0 2px; flex-shrink:0;
  }
  .item-remove:hover{ color:#7a1f1f; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="title">FAMILY BOARD</div>
  <div class="legend">
    <div class="legend-item"><span class="legend-swatch" style="background:var(--thread-parent)"></span>Parent / child</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--thread-spouse)"></span>Spouse</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--thread-sibling);border-top:2px dashed var(--thread-sibling);height:0;"></span>Sibling</div>
  </div>
  <select id="arrange-select" class="arrange-select">
    <option value="" selected>Arrange...</option>
    <option value="generational">Generational tree</option>
    <option value="chronological">Chronological (birth year)</option>
    <option value="clusters">Connection clusters</option>
    <option value="manual">Manual (reset to saved positions)</option>
  </select>
  <button id="track-lineage-btn" type="button" class="toolbar-btn">Track lineage</button>
  <button id="track-relation-btn" type="button" class="toolbar-btn">Track relation</button>
  <span id="tracking-hint" class="tracking-hint">Click a person to trace their ancestors</span>
  <div class="count" id="person-count">0 people</div>
  <div class="sync-status" id="sync-status"><span class="sync-dot"></span><span id="sync-label">Connecting...</span></div>
</div>

<div id="canvas">
  <div id="world">
    <svg id="links-svg"></svg>
    <div id="ghost-card">
      <span class="plus">+</span>
      Add the first person
    </div>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <h2 id="modal-title">Add person</h2>
    <form id="person-form">
      <div id="relation-field">
        <label for="relation">Relation to selected person</label>
        <select id="relation">
          <option value="parent">Parent</option>
          <option value="child">Child</option>
          <option value="spouse">Spouse</option>
          <option value="sibling">Sibling</option>
        </select>
      </div>
      <label for="p-name">Full name</label>
      <input id="p-name" type="text" required autocomplete="off" placeholder="e.g. Margaret O'Neill">
      <div id="name-suggestions" class="suggestions"></div>
      <div id="existing-note" class="existing-note">
        Linking the existing person already on the board.
        <a href="#" id="clear-existing">Add as a new person instead</a>
      </div>
      <label for="p-maiden">Maiden name <span class="label-optional">(if different)</span></label>
      <input id="p-maiden" type="text" placeholder="e.g. Sullivan">
      <div class="modal-row">
        <div>
          <label for="p-birth">Born</label>
          <input id="p-birth" type="number" placeholder="1902">
        </div>
        <div>
          <label for="p-death">Died</label>
          <input id="p-death" type="number" placeholder="blank if living">
        </div>
      </div>
      <label for="p-birthplace">Place of birth</label>
      <input id="p-birthplace" type="text" placeholder="e.g. Cork, Ireland">
      <label for="p-gender">Gender</label>
      <select id="p-gender">
        <option value="f">Female</option>
        <option value="m">Male</option>
        <option value="o">Other</option>
        <option value="u">Unknown</option>
      </select>
      <div class="actions">
        <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
        <button type="submit" class="btn-submit">Add to board</button>
      </div>
    </form>
  </div>
</div>

<div id="timeline-overlay">
  <div id="timeline-modal">
    <div class="timeline-header">
      <div>
        <h2 id="timeline-name">Name</h2>
        <div id="timeline-dates" class="timeline-dates"></div>
      </div>
      <div class="timeline-header-actions">
        <button id="timeline-edit-btn" type="button" class="icon-btn" aria-label="Edit person" title="Edit person">&#9998;</button>
        <button id="timeline-close" type="button" class="icon-btn" aria-label="Close">&times;</button>
      </div>
    </div>
    <div id="timeline-body">
      <table id="timeline-table">
        <thead>
          <tr><th>Year</th><th>Event</th><th>Evidence</th></tr>
        </thead>
        <tbody id="timeline-tbody"></tbody>
      </table>
      <div id="timeline-empty-note" class="timeline-empty-note"></div>
    </div>
  </div>
</div>

<div id="edit-overlay">
  <div id="edit-modal">
    <div class="timeline-header">
      <h2>Edit <span id="edit-person-name-label"></span></h2>

<script type="module">

const fbApp = initializeApp(firebaseConfig);

const db = getFirestore(fbApp);
const peopleCol = collection(db, 'people');
const linksCol = collection(db, 'links');
const eventsCol = collection(db, 'events');

(function(){

  // ---------- World / data ----------
  const WORLD_W = 4000, WORLD_H = 3000;
  const CENTER_X = WORLD_W / 2, CENTER_Y = WORLD_H / 2;
  const CARD_W = 150, CARD_H = 80;

  let nodes = [];       // {id, name, birth, death, gender, rotation, x, y}
  let links = [];       // {source, target, type: 'parent' | 'spouse' | 'sibling'}
  let events = [];      // {id, personId, year, description, evidence, createdAt}
  let localPositionOverrides = {}; // id -> {x,y}; session-only, never written to Firestore
  let savedPositions = {}; // id -> {x,y}; last known real (Firestore) positions, pre-override

  // Applies any active local overrides on top of freshly-synced node data,
  // so a locally-arranged layout survives realtime refreshes triggered by
  // unrelated changes elsewhere on the board.
  function applyLocalOverrides(){
    nodes.forEach(n => {
      const ov = localPositionOverrides[n.id];
      if (ov){ n.x = ov.x; n.y = ov.y; }
    });
  }

  // "Manual" option: discard any local-only arrangement and snap everyone
  // back to their actual saved positions.
  function resetToSavedPositions(){
    localPositionOverrides = {};
    nodes.forEach(n => {
      const saved = savedPositions[n.id];
      if (saved){ n.x = saved.x; n.y = saved.y; }
    });
    renderAll();
    const posMap = {};
    nodes.forEach(n => { posMap[n.id] = { x: n.x, y: n.y }; });
    fitToPositions(posMap);
    setSyncStatus('synced', 'Synced');
  }

  const genderColor = { f:'#a2456b', m:'#3a5b8b', o:'#7a5ba8', u:'#8a8478' };

  const OFFSETS = {
    parent:  { dx: 0,    dy: -170 },
    child:   { dx: 0,    dy: 170  },
    spouse:  { dx: 210,  dy: 0    },
    sibling: { dx: -210, dy: 0    }
  };

  // ---------- DOM refs ----------
  const canvasEl = document.getElementById('canvas');
  const worldEl = document.getElementById('world');
  const linksSvg = document.getElementById('links-svg');
  const ghostCard = document.getElementById('ghost-card');
  const overlay = document.getElementById('overlay');
  const modalTitle = document.getElementById('modal-title');
  const relationField = document.getElementById('relation-field');
  const relationSelect = document.getElementById('relation');
  const form = document.getElementById('person-form');
  const personCountEl = document.getElementById('person-count');
  const syncStatusEl = document.getElementById('sync-status');
  const syncLabelEl = document.getElementById('sync-label');

  let pendingSourceId = null; // person we're adding a relative to (null = first person)
  const cardEls = {};         // id -> card DOM element
  const linkEls = [];         // {el, sourceId, targetId}

  function nodeById(id){ return nodes.find(n => n.id === id); }

  // ---------- Rendering ----------
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function linkPath(sx, sy, tx, ty){
    const mx = (sx + tx) / 2, my = (sy + ty) / 2;
    const dist = Math.hypot(tx - sx, ty - sy);
    const sag = Math.min(45, dist * 0.18);
    return `M${sx},${sy} Q${mx},${my + sag} ${tx},${ty}`;
  }

  // Word describing what the SOURCE is to the TARGET, e.g. for a parent
  // link (source is parent of target) this returns "father"/"mother"/"parent" —
  // i.e. what the person at the near end (line start) is to the person at the
  // far end. This sits near the source, so it reads as "this person is a ___
  // to the person the thread leads to".
  function relationLabel(type, sourceNode){
    const g = sourceNode.gender;
    if (type === 'parent'){
      if (g === 'm') return 'father';
      if (g === 'f') return 'mother';
      return 'parent';
    }
    if (type === 'spouse'){
      if (g === 'm') return 'husband';
      if (g === 'f') return 'wife';
      return 'spouse';
    }
    if (type === 'sibling'){
      if (g === 'm') return 'brother';
      if (g === 'f') return 'sister';
      return 'sibling';
    }
    return '';
  }

  // Point at parameter t (0..1) along the same quadratic curve used for the thread.
  function pointOnCurve(p0, p1, p2, t){
    const mt = 1 - t;
    return {
      x: mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x,
      y: mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y
    };
  }

  // Choose a t that places the label roughly a fixed pixel distance from the
  // source end ("the beginning of the line"), regardless of the link's total
  // length, clamped so it never lands past the midpoint or right on the pin.
  function labelParamForDistance(dist){
    const desired = 55;
    const t = dist > 0 ? desired / dist : 0.3;
    return Math.min(0.42, Math.max(0.16, t));
  }

  // Cheap update: just move existing elements to match current node/link data.
  // Called on drag and after adding someone.
  function updatePositions(){
    nodes.forEach(n => {
      const el = cardEls[n.id];
      if (!el) return;
      el.style.left = (n.x - CARD_W / 2) + 'px';
      el.style.top = (n.y - CARD_H / 2) + 'px';
      el.style.transform = `rotate(${n.rotation}deg)`;
    });
    linkEls.forEach(l => {
      const s = nodeById(l.sourceId), t = nodeById(l.targetId);
      if (!s || !t) return;
      const mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
      const dist = Math.hypot(t.x - s.x, t.y - s.y);
      const sag = Math.min(45, dist * 0.18);
      const p0 = { x: s.x, y: s.y }, p1 = { x: mx, y: my + sag }, p2 = { x: t.x, y: t.y };
      l.el.setAttribute('d', `M${p0.x},${p0.y} Q${p1.x},${p1.y} ${p2.x},${p2.y}`);

      const labelPt = pointOnCurve(p0, p1, p2, labelParamForDistance(dist));
      l.tagEl.style.left = labelPt.x + 'px';
      l.tagEl.style.top = labelPt.y + 'px';
    });
  }

  // Full rebuild: called whenever nodes/links are added or removed.
  function renderAll(){
    // clear
    linksSvg.innerHTML = '';
    linkEls.length = 0;
    Object.keys(cardEls).forEach(id => delete cardEls[id]);
    worldEl.querySelectorAll('.card').forEach(el => el.remove());
    worldEl.querySelectorAll('.link-tag').forEach(el => el.remove());

    // links (draw first, underneath cards)
    links.forEach(l => {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('class', 'thread thread-' + l.type);
      linksSvg.appendChild(path);

      const tag = document.createElement('div');
      tag.className = 'link-tag';
      const sourceNode = nodeById(l.source);
      tag.textContent = sourceNode ? relationLabel(l.type, sourceNode) : '';
      worldEl.appendChild(tag);

      linkEls.push({ el: path, tagEl: tag, sourceId: l.source, targetId: l.target, type: l.type, id: l.id });
    });

    // cards
    nodes.forEach(n => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.personId = n.id;

      const pin = document.createElement('div');
      pin.className = 'pin';
      card.appendChild(pin);

      const nameEl = document.createElement('div');
      nameEl.className = 'name';
      nameEl.innerHTML = `<span class="gender-dot" style="background:${genderColor[n.gender] || genderColor.u}"></span>${escapeHtml(n.name)}`;
      card.appendChild(nameEl);

      const datesEl = document.createElement('div');
      datesEl.className = 'dates';
      if (n.birth || n.death){
        const b = n.birth || '?';
        const d = n.death ? n.death : 'living';
        datesEl.textContent = `${b} \u2013 ${d}`;
      }
      card.appendChild(datesEl);

      if (n.maidenName){
        const maidenEl = document.createElement('div');
        maidenEl.className = 'maiden';
        maidenEl.textContent = `n\u00e9e ${n.maidenName}`;
        card.appendChild(maidenEl);
      }

      const addBtn = document.createElement('div');
      addBtn.className = 'add-btn';
      addBtn.textContent = '+';
      addBtn.addEventListener('click', (e) => { e.stopPropagation(); openModal(n.id); });
      card.appendChild(addBtn);

      attachDrag(card, n);

      worldEl.appendChild(card);
      cardEls[n.id] = card;
    });

    personCountEl.textContent = nodes.length + (nodes.length === 1 ? ' person' : ' people');
    ghostCard.style.display = nodes.length === 0 ? 'block' : 'none';

    updatePositions();
    refreshTrackingHighlight(); // reapply if a lineage/relation is currently being tracked
  }

  // ---------- Camera (pan + zoom) ----------
  // Everything below is in "world space" (the fixed WORLD_W x WORLD_H
  // coordinate system nodes live in). The camera maps world space to screen
  // space via: screenX = worldX * camScale + camX  (and same for Y).
  let camX = 0, camY = 0, camScale = 1;
  const MIN_ZOOM = 0.3, MAX_ZOOM = 2.5;

  function applyCamera(){
    worldEl.style.transform = `translate(${camX}px, ${camY}px) scale(${camScale})`;
  }

  // ---------- Drag ----------
  function attachDrag(cardEl, node){
    let startX, startY, startNodeX, startNodeY, dragging = false, moved = false;

    cardEl.addEventListener('mousedown', (e) => {
      // Ignore drags started on the add button
      if (e.target.closest('.add-btn')) return;
      e.stopPropagation(); // don't also trigger background panning
      dragging = true;
      moved = false;
      cardEl.classList.add('dragging');
      startX = e.clientX; startY = e.clientY;
      startNodeX = node.x; startNodeY = node.y;
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (Math.hypot(dx, dy) > 4) moved = true; // small threshold = still a "click"
      // Mouse movement is in screen pixels; divide by the zoom level to get
      // the equivalent movement in world-space units, so the card tracks
      // the cursor accurately at any zoom level.
      node.x = clamp(startNodeX + dx / camScale, CARD_W, WORLD_W - CARD_W);
      node.y = clamp(startNodeY + dy / camScale, CARD_H, WORLD_H - CARD_H);
      updatePositions();
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      cardEl.classList.remove('dragging');
      if (moved){
        // A manual drag is an explicit edit, so this card "graduates" out
        // of any local-only arrangement and gets a real saved position.
        delete localPositionOverrides[node.id];
        // Only write the final position once the drag ends, not on every
        // mousemove — that would flood Firestore with writes.
        updateDoc(doc(peopleCol, node.id), { x: node.x, y: node.y }).catch(err => {
          console.error('Failed to save position', err);
        });
      } else {
        if (trackingMode) setTrackedPerson(node.id);
        else if (relationTrackingMode) handleRelationClick(node.id);
        else openTimelineModal(node.id);
      }
    });
  }

  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  // ---------- Auto-arrange ----------
  const ROW_HEIGHT = 220;
  const COL_WIDTH = 190;
  const FAMILY_GAP = 90; // extra horizontal gap between different family clusters in a row

  function buildUndirectedAdjacency(){
    const adj = {};
    nodes.forEach(n => { adj[n.id] = []; });
    links.forEach(l => {
      if (adj[l.source]) adj[l.source].push(l.target);
      if (adj[l.target]) adj[l.target].push(l.source);
    });
    return adj;
  }

  // Groups people into connected "families" (anyone reachable via any kind
  // of link), so generational/chronological layouts can keep each family
  // clustered together horizontally instead of interleaving unrelated ones.
  function computeComponents(){
    const adj = buildUndirectedAdjacency();
    const compOf = {};
    let compIndex = 0;
    nodes.forEach(n => {
      if (compOf[n.id] !== undefined) return;
      const queue = [n.id];
      compOf[n.id] = compIndex;
      while (queue.length){
        const cur = queue.shift();
        (adj[cur] || []).forEach(other => {
          if (compOf[other] === undefined){
            compOf[other] = compIndex;
            queue.push(other);
          }
        });
      }
      compIndex++;
    });
    return compOf;
  }

  // Assigns each person a generation number by walking parent/child links
  // (+1 per generation down), keeping spouses and bare-sibling links level
  // (delta 0). Each connected family is normalized independently so its
  // eldest known ancestor sits at generation 0 — unrelated families aren't
  // necessarily "the same era", just visually aligned for readability.
  function computeGenerations(){
    const adj = {};
    nodes.forEach(n => { adj[n.id] = []; });
    function addEdge(a, b, delta){
      if (adj[a]) adj[a].push({ other: b, delta });
      if (adj[b]) adj[b].push({ other: a, delta: -delta });
    }
    links.forEach(l => {
      if (l.type === 'parent') addEdge(l.source, l.target, 1);
      else addEdge(l.source, l.target, 0);
    });

    const gen = {};
    const visited = new Set();
    nodes.forEach(n => {
      if (visited.has(n.id)) return;
      gen[n.id] = 0;
      visited.add(n.id);
      const queue = [n.id];
      const componentIds = [n.id];
      let minGen = 0;
      while (queue.length){
        const cur = queue.shift();
        (adj[cur] || []).forEach(edge => {
          if (!visited.has(edge.other)){
            gen[edge.other] = gen[cur] + edge.delta;
            minGen = Math.min(minGen, gen[edge.other]);
            visited.add(edge.other);
            queue.push(edge.other);
            componentIds.push(edge.other);
          }
        });
      }
      componentIds.forEach(id => { gen[id] -= minGen; });
    });
    return gen;
  }

  function arrangeGenerational(){
    const gen = computeGenerations();
    const compOf = computeComponents();

    const rows = {};
    nodes.forEach(n => {
      const g = gen[n.id] || 0;
      (rows[g] = rows[g] || []).push(n);
    });

    const updates = {};
    const sortedGenKeys = Object.keys(rows).map(Number).sort((a, b) => a - b);

    sortedGenKeys.forEach((g, rowIndex) => {
      const rowNodes = rows[g].slice().sort((a, b) => {
        const ca = compOf[a.id], cb = compOf[b.id];
        if (ca !== cb) return ca - cb; // keep each family contiguous
        const ba = a.birth || 9999, bb = b.birth || 9999;
        if (ba !== bb) return ba - bb; // eldest-first within a family
        return a.name.localeCompare(b.name);
      });

      let x = 0, lastComp = null;
      const xs = [];
      rowNodes.forEach(n => {
        const c = compOf[n.id];
        if (lastComp !== null && c !== lastComp) x += FAMILY_GAP;
        xs.push(x);
        x += COL_WIDTH;
        lastComp = c;
      });
      const totalWidth = x - COL_WIDTH;
      const offsetX = CENTER_X - totalWidth / 2;
      const rowY = CENTER_Y + (rowIndex - (sortedGenKeys.length - 1) / 2) * ROW_HEIGHT;

      rowNodes.forEach((n, i) => {
        updates[n.id] = {
          x: clamp(offsetX + xs[i], CARD_W, WORLD_W - CARD_W),
          y: clamp(rowY, CARD_H, WORLD_H - CARD_H)
        };
      });
    });

    return updates;
  }

  // Vertical position proportional to birth year (a literal timeline);
  // people born close together get pulled into the same horizontal "band"
  // so they don't overlap. Anyone with no recorded birth year gets their
  // own row at the very bottom rather than being silently dropped.
  function arrangeChronological(){
    const PIXELS_PER_YEAR = 14;
    const BAND_GAP_THRESHOLD = CARD_H * 1.3;

    const known = nodes.filter(n => n.birth != null)
      .slice().sort((a, b) => (a.birth - b.birth) || a.name.localeCompare(b.name));
    const unknown = nodes.filter(n => n.birth == null);

    const bands = [];
    let currentBand = null, lastY = null;
    known.forEach(n => {
      const idealY = n.birth * PIXELS_PER_YEAR;
      if (currentBand === null || (idealY - lastY) >= BAND_GAP_THRESHOLD){
        currentBand = { y: idealY, members: [] };
        bands.push(currentBand);
      }
      currentBand.members.push(n);
      lastY = idealY;
    });

    const updates = {};
    const minBandY = bands.length ? bands[0].y : 0;
    const TOP = 200;

    bands.forEach(band => {
      const totalWidth = (band.members.length - 1) * COL_WIDTH;
      const startX = CENTER_X - totalWidth / 2;
      band.members.forEach((n, i) => {
        updates[n.id] = {
          x: clamp(startX + i * COL_WIDTH, CARD_W, WORLD_W - CARD_W),
          y: clamp(TOP + (band.y - minBandY), CARD_H, WORLD_H - CARD_H)
        };
      });
    });

    if (unknown.length){
      const lastBandY = bands.length ? (TOP + (bands[bands.length - 1].y - minBandY)) : TOP;
      const unknownRowY = lastBandY + ROW_HEIGHT;
      const totalWidth = (unknown.length - 1) * COL_WIDTH;
      const startX = CENTER_X - totalWidth / 2;
      unknown.forEach((n, i) => {
        updates[n.id] = {
          x: clamp(startX + i * COL_WIDTH, CARD_W, WORLD_W - CARD_W),
          y: clamp(unknownRowY, CARD_H, WORLD_H - CARD_H)
        };
      });
    }

    return updates;
  }

  // One-shot force layout: pulls tightly-linked people together and lets
  // loosely-connected people drift apart, starting from wherever they
  // currently sit (so it settles rather than teleporting from scratch).
  function arrangeClusters(){
    const pos = {};
    nodes.forEach(n => { pos[n.id] = { x: n.x, y: n.y, vx: 0, vy: 0 }; });
    const ids = Object.keys(pos);

    const REPULSION = 14000;
    const LINK_DIST = { parent: 150, spouse: 100, sibling: 170 };
    const LINK_STRENGTH = 0.02;
    const DAMPING = 0.85;
    const ITERATIONS = 220;

    for (let iter = 0; iter < ITERATIONS; iter++){
      for (let i = 0; i < ids.length; i++){
        for (let j = i + 1; j < ids.length; j++){
          const a = pos[ids[i]], b = pos[ids[j]];
          const dx = a.x - b.x, dy = a.y - b.y;
          const distSq = (dx * dx + dy * dy) || 0.01;
          const dist = Math.sqrt(distSq);
          const force = REPULSION / distSq;
          const fx = (dx / dist) * force, fy = (dy / dist) * force;
          a.vx += fx; a.vy += fy;
          b.vx -= fx; b.vy -= fy;
        }
      }
      links.forEach(l => {
        const a = pos[l.source], b = pos[l.target];
        if (!a || !b) return;
        const targetDist = LINK_DIST[l.type] || 150;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx, dy) || 0.01;
        const diff = (dist - targetDist) * LINK_STRENGTH;
        const fx = (dx / dist) * diff, fy = (dy / dist) * diff;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      });
      ids.forEach(id => {
        const p = pos[id];
        p.vx *= DAMPING; p.vy *= DAMPING;
        p.x += p.vx; p.y += p.vy;
        p.vx += (CENTER_X - p.x) * 0.0006;
        p.vy += (CENTER_Y - p.y) * 0.0006;
      });
    }

    const updates = {};
    ids.forEach(id => {
      const p = pos[id];
      updates[id] = {
        x: clamp(p.x, CARD_W, WORLD_W - CARD_W),
        y: clamp(p.y, CARD_H, WORLD_H - CARD_H)
      };
    });
    return updates;
  }

  function fitToPositions(posMap){
    const vals = Object.values(posMap);
    if (!vals.length) return;
    const pad = 140;
    const xs = vals.map(p => p.x), ys = vals.map(p => p.y);
    const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
    const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
    const bw = Math.max(1, maxX - minX), bh = Math.max(1, maxY - minY);
    const scale = clamp(Math.min(canvasEl.clientWidth / bw, canvasEl.clientHeight / bh), MIN_ZOOM, MAX_ZOOM);
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    camScale = scale;
    camX = canvasEl.clientWidth / 2 - cx * scale;
    camY = canvasEl.clientHeight / 2 - cy * scale;
    worldEl.classList.add('smooth');
    applyCamera();
  }

  async function applyArrangement(kind){
    if (!nodes.length) return;
    setSyncStatus('connecting', 'Arranging...');
    await new Promise(r => setTimeout(r, 20)); // let the status text paint before the heavy work

    let updates;
    if (kind === 'generational') updates = arrangeGenerational();
    else if (kind === 'chronological') updates = arrangeChronological();
    else if (kind === 'clusters') updates = arrangeClusters();
    else return;

    // Local-only: this rearranges the board just for you, without writing
    // to Firestore, so it won't move anything for other people viewing or
    // editing the tree. Positions are held in memory for this session and
    // reapplied automatically if a sync refresh would otherwise overwrite
    // them (e.g. someone else adds a person elsewhere on the board).
    // Dragging a specific card afterward still saves for real, since a
    // manual drag is an explicit, intentional edit.
    localPositionOverrides = {};
    Object.keys(updates).forEach(id => { localPositionOverrides[id] = updates[id]; });
    applyLocalOverrides();
    renderAll();
    fitToPositions(updates);
    setSyncStatus('synced', 'Arranged (not saved)');
  }

  document.getElementById('arrange-select').addEventListener('change', (e) => {
    const kind = e.target.value;
    e.target.value = ''; // reset — this is a one-shot action, not a persistent mode
    if (kind === 'manual') resetToSavedPositions();
    else if (kind) applyArrangement(kind);
  });

  // ---------- Tracking (shared highlight engine for both modes below) ----------
  // Both "Track lineage" and "Track relation" highlight a set of people and
  // the specific links connecting them, dimming everything else. This one
  // function drives the actual DOM styling for either mode.
  function applyPathHighlight(active, endpointIds, pathIds, linkIsHighlighted){
    Object.values(cardEls).forEach(el => {
      el.classList.remove('lineage-root', 'lineage-ancestor', 'lineage-dim');
    });
    linkEls.forEach(l => { l.el.classList.remove('thread-lineage', 'thread-dim'); });

    if (!active) return;

    Object.keys(cardEls).forEach(id => {
      const el = cardEls[id];
      if (endpointIds && endpointIds.has(id)) el.classList.add('lineage-root');
      else if (pathIds && pathIds.has(id)) el.classList.add('lineage-ancestor');
      else el.classList.add('lineage-dim');
    });

    linkEls.forEach(l => {
      l.el.classList.add(linkIsHighlighted(l) ? 'thread-lineage' : 'thread-dim');
    });
  }

  // ---------- Lineage tracking ----------
  let trackingMode = false;
  let trackedRootId = null;
  let trackedAncestorIds = new Set();

  // Walks parent links upward from personId, collecting every direct
  // ancestor on both sides (maternal and paternal), however far back the
  // tree goes. Does not include personId itself.
  function computeAncestors(personId){
    const ancestors = new Set();
    const queue = [personId];
    while (queue.length){
      const cur = queue.shift();
      links.forEach(l => {
        if (l.type === 'parent' && l.target === cur && !ancestors.has(l.source)){
          ancestors.add(l.source);
          queue.push(l.source);
        }
      });
    }
    return ancestors;
  }

  function setTrackedPerson(personId){
    trackedRootId = personId;
    trackedAncestorIds = computeAncestors(personId);
    refreshTrackingHighlight();
  }

  function clearTracking(){
    trackedRootId = null;
    trackedAncestorIds = new Set();
    refreshTrackingHighlight();
  }

  // ---------- Relation tracking ----------
  let relationTrackingMode = false;
  let relationFirstId = null;
  let relationPathIds = null;     // all node ids on the found path, including endpoints
  let relationEndpointIds = null; // just the two chosen people
  let relationPathLinkIds = null; // exact link ids used, so the right edges light up

  // Shortest path between two people through ANY relationship type (parent,
  // spouse, sibling) — this is what reveals things like "these two are
  // cousins" (path goes up through parents to a shared ancestor, then back
  // down) or "these two are connected by marriage".
  function findRelationPath(idA, idB){
    if (idA === idB) return null;
    const adj = {};
    nodes.forEach(n => { adj[n.id] = []; });
    links.forEach(l => {
      if (adj[l.source]) adj[l.source].push({ neighborId: l.target, linkId: l.id });
      if (adj[l.target]) adj[l.target].push({ neighborId: l.source, linkId: l.id });
    });

    const visited = new Set([idA]);
    const prev = {};
    const queue = [idA];
    while (queue.length){
      const cur = queue.shift();
      if (cur === idB) break;
      (adj[cur] || []).forEach(({ neighborId, linkId }) => {
        if (!visited.has(neighborId)){
          visited.add(neighborId);
          prev[neighborId] = { fromId: cur, linkId };
          queue.push(neighborId);
        }
      });
    }
    if (!visited.has(idB)) return null;

    const nodeIds = [idB];
    const linkIds = [];
    let cur = idB;
    while (cur !== idA){
      const p = prev[cur];
      linkIds.push(p.linkId);
      cur = p.fromId;
      nodeIds.push(cur);
    }
    nodeIds.reverse();
    linkIds.reverse();
    return { nodeIds, linkIds };
  }

  function ordinalWord(n){
    if (n === 1) return '1st';
    if (n === 2) return '2nd';
    if (n === 3) return '3rd';
    return n + 'th';
  }
  function removalWord(r){
    if (r === 0) return '';
    if (r === 1) return ' once removed';
    if (r === 2) return ' twice removed';
    return ' ' + r + ' times removed';
  }
  function directAncestorWord(n){
    if (n === 1) return 'parent and child';
    if (n === 2) return 'grandparent and grandchild';
    if (n === 3) return 'great-grandparent and great-grandchild';
    return (n - 2) + 'x-great-grandparent and great-grandchild';
  }

  // Tries to give a precise relationship label (siblings, cousins, etc.)
  // when the path is pure blood ancestry; falls back to something more
  // general when the path runs through a marriage or a bare sibling link.
  function describeRelationPath(nodeIds, linkIds){
    const edges = linkIds.map((linkId, i) => {
      const link = links.find(l => l.id === linkId);
      if (!link) return null;
      if (link.type !== 'parent') return { type: link.type };
      const from = nodeIds[i];
      return { type: 'parent', direction: link.source === from ? 'down' : 'up' };
    });

    if (edges.some(e => !e || e.type !== 'parent')){
      return edges.some(e => e && e.type === 'spouse') ? 'Related by marriage' : 'Related';
    }

    let i = 0, upSteps = 0;
    while (i < edges.length && edges[i].direction === 'up'){ upSteps++; i++; }
    const downSteps = edges.length - upSteps;
    for (let j = i; j < edges.length; j++){
      if (edges[j].direction !== 'down') return 'Related'; // irregular path, skip precise labeling
    }

    if (upSteps === 0 || downSteps === 0) return directAncestorWord(Math.max(upSteps, downSteps));
    if (upSteps === 1 && downSteps === 1) return 'Siblings';

    const degree = Math.min(upSteps, downSteps) - 1;
    const removal = Math.abs(upSteps - downSteps);
    return ordinalWord(degree) + ' cousins' + removalWord(removal);
  }

  function handleRelationClick(personId){
    if (!relationFirstId){
      relationFirstId = personId;
      relationPathIds = null; relationEndpointIds = null; relationPathLinkIds = null;
      const p = nodeById(personId);
      trackingHint.textContent = (p ? p.name : 'Selected') + ' \u2014 now click the second person';
      refreshTrackingHighlight();
      return;
    }

    const firstId = relationFirstId;
    relationFirstId = null; // next click (after this) starts a fresh pair
    if (firstId === personId){
      trackingHint.textContent = 'Choose two different people \u2014 click the first one again';
      return;
    }

    const result = findRelationPath(firstId, personId);
    const nameA = (nodeById(firstId) || {}).name || 'That person';
    const nameB = (nodeById(personId) || {}).name || 'this person';

    if (!result){
      relationPathIds = new Set([firstId, personId]);
      relationEndpointIds = new Set([firstId, personId]);
      relationPathLinkIds = new Set();
      trackingHint.textContent = `No connection found between ${nameA} and ${nameB}`;
    } else {
      relationPathIds = new Set(result.nodeIds);
      relationEndpointIds = new Set([firstId, personId]);
      relationPathLinkIds = new Set(result.linkIds);
      const label = describeRelationPath(result.nodeIds, result.linkIds);
      trackingHint.textContent = `${nameA} & ${nameB}: ${label}`;
    }
    refreshTrackingHighlight();
  }

  function clearRelationTracking(){
    relationFirstId = null;
    relationPathIds = null; relationEndpointIds = null; relationPathLinkIds = null;
    refreshTrackingHighlight();
  }

  // Decides which mode (if any) is active and drives the shared highlighter.
  function refreshTrackingHighlight(){
    if (trackingMode && trackedRootId && cardEls[trackedRootId]){
      applyPathHighlight(true, new Set([trackedRootId]), trackedAncestorIds, (l) =>
        l.type === 'parent' &&
        (l.targetId === trackedRootId || trackedAncestorIds.has(l.targetId)) &&
        trackedAncestorIds.has(l.sourceId)
      );
    } else if (relationTrackingMode && relationFirstId && !relationPathIds){
      applyPathHighlight(true, new Set([relationFirstId]), new Set(), () => false);
    } else if (relationTrackingMode && relationPathIds){
      const middleOnly = new Set([...relationPathIds].filter(id => !relationEndpointIds.has(id)));
      applyPathHighlight(true, relationEndpointIds, middleOnly, (l) => relationPathLinkIds.has(l.id));
    } else {
      applyPathHighlight(false);
    }
  }

  const trackLineageBtn = document.getElementById('track-lineage-btn');
  const trackRelationBtn = document.getElementById('track-relation-btn');
  const trackingHint = document.getElementById('tracking-hint');

  trackLineageBtn.addEventListener('click', () => {
    trackingMode = !trackingMode;
    trackLineageBtn.classList.toggle('active', trackingMode);
    if (trackingMode){
      relationTrackingMode = false;
      trackRelationBtn.classList.remove('active');
      clearRelationTracking();
      trackingHint.textContent = 'Click a person to trace their ancestors';
      trackingHint.classList.add('show');
    } else {
      trackingHint.classList.remove('show');
      clearTracking();
    }
  });

  trackRelationBtn.addEventListener('click', () => {
    relationTrackingMode = !relationTrackingMode;
    trackRelationBtn.classList.toggle('active', relationTrackingMode);
    if (relationTrackingMode){
      trackingMode = false;
      trackLineageBtn.classList.remove('active');
      clearTracking();
      relationFirstId = null;
      relationPathIds = null; relationEndpointIds = null; relationPathLinkIds = null;
      trackingHint.textContent = 'Click the first person';
      trackingHint.classList.add('show');
      refreshTrackingHighlight();
    } else {
      trackingHint.classList.remove('show');
      clearRelationTracking();
    }
  });

  // ---------- Moving the camera to a point ----------
  function centerOn(x, y){
    camX = canvasEl.clientWidth / 2 - x * camScale;
    camY = canvasEl.clientHeight / 2 - y * camScale;
    worldEl.classList.add('smooth');
    applyCamera();
  }

  // ---------- Background pan (click-and-drag to move the view) ----------
  function attachPan(){
    let panning = false;
    let startX, startY, startCamX, startCamY;

    canvasEl.addEventListener('mousedown', (e) => {
      // Only pan when the mousedown is on empty board, not on a card
      // (card mousedown handlers call stopPropagation, so this only fires
      // for genuine background clicks/drags).
      if (e.target.closest('.card')) return;
      panning = true;
      canvasEl.classList.add('panning');
      worldEl.classList.remove('smooth'); // instant tracking while dragging
      startX = e.clientX; startY = e.clientY;
      startCamX = camX; startCamY = camY;
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!panning) return;
      camX = startCamX + (e.clientX - startX);
      camY = startCamY + (e.clientY - startY);
      applyCamera();
    });

    window.addEventListener('mouseup', () => {
      if (!panning) return;
      panning = false;
      canvasEl.classList.remove('panning');
    });
  }

  // ---------- Zoom (mouse wheel) ----------
  function attachZoom(){
    canvasEl.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = canvasEl.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      // The world-space point currently under the cursor, so we can keep
      // it fixed under the cursor after rescaling (zoom "toward" the mouse
      // rather than toward the top-left corner).
      const worldX = (mouseX - camX) / camScale;
      const worldY = (mouseY - camY) / camScale;

      // Proportional to scroll amount — feels smooth on both notchy mouse
      // wheels and continuous trackpad scrolling.
      const zoomFactor = Math.pow(1.0015, -e.deltaY);
      const newScale = clamp(camScale * zoomFactor, MIN_ZOOM, MAX_ZOOM);

      camX = mouseX - worldX * newScale;
      camY = mouseY - worldY * newScale;
      camScale = newScale;

      worldEl.classList.add('smooth');
      applyCamera();
    }, { passive: false });
  }

  // ---------- Touch (mobile): pan, long-press-to-drag, pinch-to-zoom ----------
  const LONG_PRESS_MS = 420;
  const LONG_PRESS_MOVE_CANCEL = 10; // px of drift before a pending long-press is abandoned

  function attachTouch(){
    let longPressTimer = null;
    let pendingCardEl = null, pendingNode = null;
    let touchStartX = 0, touchStartY = 0;

    let cardDragActive = false;
    let dragStart = { x: 0, y: 0, nodeX: 0, nodeY: 0 };

    let panActive = false;
    let panStart = { x: 0, y: 0, camX: 0, camY: 0 };

    let pinchActive = false;
    let pinchStartDist = 0, pinchStartScale = 1;
    let pinchStartMid = { x: 0, y: 0 }, pinchStartCam = { x: 0, y: 0 };

    function dist(t1, t2){ return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY); }
    function mid(t1, t2){ return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 }; }

    function clearPending(){
      clearTimeout(longPressTimer);
      longPressTimer = null;
      pendingCardEl = null;
      pendingNode = null;
    }

    canvasEl.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2){
        // A second finger landed — cancel any pending tap/drag and start a pinch.
        clearPending();
        cardDragActive = false;
        panActive = false;
        canvasEl.classList.remove('panning');
        pinchActive = true;
        const [t1, t2] = e.touches;
        pinchStartDist = dist(t1, t2);
        pinchStartScale = camScale;
        pinchStartMid = mid(t1, t2);
        pinchStartCam = { x: camX, y: camY };
        worldEl.classList.remove('smooth');
        e.preventDefault();
        return;
      }

      if (e.touches.length !== 1 || pinchActive) return;

      const touch = e.touches[0];
      const target = touch.target;
      if (target.closest('.add-btn')) return; // let the button's own tap handling proceed untouched

      const cardEl = target.closest('.card');
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;

      if (cardEl){
        const node = nodeById(cardEl.dataset.personId);
        if (!node) return;
        e.preventDefault(); // avoid iOS text-selection/callout during the hold
        pendingCardEl = cardEl;
        pendingNode = node;
        longPressTimer = setTimeout(() => {
          longPressTimer = null;
          cardDragActive = true;
          dragStart = { x: touchStartX, y: touchStartY, nodeX: node.x, nodeY: node.y };
          cardEl.classList.add('dragging');
        }, LONG_PRESS_MS);
      } else if (!target.closest('#ghost-card')){
        // Empty background — pan starts immediately, same as a mouse drag.
        panActive = true;
        canvasEl.classList.add('panning');
        worldEl.classList.remove('smooth');
        panStart = { x: touch.clientX, y: touch.clientY, camX, camY };
      }
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (pinchActive && e.touches.length === 2){
        e.preventDefault();
        const [t1, t2] = e.touches;
        const newDist = dist(t1, t2);
        const newMid = mid(t1, t2);
        const scaleFactor = newDist / pinchStartDist;
        const newScale = clamp(pinchStartScale * scaleFactor, MIN_ZOOM, MAX_ZOOM);
        // Keep the pinch's starting midpoint anchored under the fingers,
        // and follow however the midpoint itself has moved (pan + zoom combined).
        const worldX = (pinchStartMid.x - pinchStartCam.x) / pinchStartScale;
        const worldY = (pinchStartMid.y - pinchStartCam.y) / pinchStartScale;
        camX = newMid.x - worldX * newScale;
        camY = newMid.y - worldY * newScale;
        camScale = newScale;
        applyCamera();
        return;
      }

      if (e.touches.length !== 1) return;
      const touch = e.touches[0];

      if (cardDragActive && pendingNode){
        e.preventDefault();
        const dx = touch.clientX - dragStart.x, dy = touch.clientY - dragStart.y;
        pendingNode.x = clamp(dragStart.nodeX + dx / camScale, CARD_W, WORLD_W - CARD_W);
        pendingNode.y = clamp(dragStart.nodeY + dy / camScale, CARD_H, WORLD_H - CARD_H);
        updatePositions();
        return;
      }

      if (longPressTimer){
        // Finger drifted before the hold registered — treat as an abandoned
        // tap rather than a drag (this deliberately does NOT fall back to
        // panning: press-and-hold is the dedicated "move this card" gesture).
        const dx = touch.clientX - touchStartX, dy = touch.clientY - touchStartY;
        if (Math.hypot(dx, dy) > LONG_PRESS_MOVE_CANCEL) clearPending();
        return;
      }

      if (panActive){
        e.preventDefault();
        camX = panStart.camX + (touch.clientX - panStart.x);
        camY = panStart.camY + (touch.clientY - panStart.y);
        applyCamera();
      }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
      if (pinchActive){
        if (e.touches.length < 2) pinchActive = false;
        return;
      }

      if (cardDragActive && pendingNode){
        pendingCardEl.classList.remove('dragging');
        delete localPositionOverrides[pendingNode.id];
        updateDoc(doc(peopleCol, pendingNode.id), { x: pendingNode.x, y: pendingNode.y }).catch(err => {
          console.error('Failed to save position', err);
        });
        cardDragActive = false;
        pendingCardEl = null; pendingNode = null;
        return;
      }

      if (longPressTimer){
        // Long-press never fired — this was a genuine tap.
        e.preventDefault();
        const tappedNode = pendingNode;
        clearPending();
        if (tappedNode){
          if (trackingMode) setTrackedPerson(tappedNode.id);
          else if (relationTrackingMode) handleRelationClick(tappedNode.id);
          else openTimelineModal(tappedNode.id);
        }
        return;
      }

      if (panActive){
        panActive = false;
        canvasEl.classList.remove('panning');
      }
    }, { passive: false });

    window.addEventListener('touchcancel', () => {
      clearPending();
      cardDragActive = false;
      panActive = false;
      pinchActive = false;
      canvasEl.classList.remove('panning');
    });
  }

  // ---------- Timeline modal ----------
  const timelineOverlay = document.getElementById('timeline-overlay');
  const timelineNameEl = document.getElementById('timeline-name');
  const timelineDatesEl = document.getElementById('timeline-dates');
  const timelineTable = document.getElementById('timeline-table');
  const timelineTbody = document.getElementById('timeline-tbody');
  const timelineEmptyNote = document.getElementById('timeline-empty-note');
  let currentTimelinePersonId = null;

  function eventsForPerson(personId){
    return events
      .filter(e => e.personId === personId)
      .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
  }

  function openTimelineModal(personId){
    const person = nodeById(personId);
    if (!person) return;
    currentTimelinePersonId = personId;

    timelineNameEl.textContent = person.maidenName ? `${person.name} (n\u00e9e ${person.maidenName})` : person.name;
    const dateRange = person.birth
      ? `${person.birth} \u2013 ${person.death || 'present'}`
      : 'Birth year unknown';
    timelineDatesEl.textContent = person.birthPlace ? `${dateRange} \u00b7 Born in ${person.birthPlace}` : dateRange;

    timelineTbody.innerHTML = '';

    const personEvents = eventsForPerson(personId);
    const eventYears = [...new Set(personEvents.map(e => e.year))].sort((a, b) => a - b);

    if (!eventYears.length){
      timelineTable.style.display = 'none';
      timelineEmptyNote.style.display = 'block';
      timelineEmptyNote.textContent = 'No life events recorded yet. Click the pencil icon to add some.';
      timelineOverlay.classList.add('open');
      return;
    }

    timelineTable.style.display = '';
    timelineEmptyNote.style.display = 'none';

    eventYears.forEach(y => {
      const yearEvents = personEvents.filter(e => e.year === y);
      const rowCount = yearEvents.length;
      const age = (person.birth != null) ? (y - person.birth) : null;

      for (let i = 0; i < rowCount; i++){
        const tr = document.createElement('tr');

        // Only the first row for a given year shows the year cell;
        // it spans down over any additional events in that same year.
        if (i === 0){
          const tdYear = document.createElement('td');
          tdYear.className = 'tl-year';

          const yearValue = document.createElement('div');
          yearValue.className = 'tl-year-value';
          yearValue.textContent = y;
          tdYear.appendChild(yearValue);

          if (age !== null){
            const ageValue = document.createElement('div');
            ageValue.className = 'tl-year-age';
            ageValue.textContent = `(${age})`;
            tdYear.appendChild(ageValue);
          }

          if (rowCount > 1) tdYear.rowSpan = rowCount;
          tr.appendChild(tdYear);
        }

        const ev = yearEvents[i];
        const tdEvent = document.createElement('td');
        tdEvent.className = 'tl-event';
        tdEvent.textContent = ev.description;

        const tdEvidence = document.createElement('td');
        tdEvidence.className = 'tl-evidence';
        const evidenceText = ev.evidence ? ev.evidence.trim() : '';
        if (evidenceText && /^https?:\/\//i.test(evidenceText)){
          const link = document.createElement('a');
          link.href = evidenceText;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = evidenceText;
          tdEvidence.appendChild(link);
        } else {
          tdEvidence.textContent = evidenceText || '\u2014';
        }

        tr.appendChild(tdEvent);
        tr.appendChild(tdEvidence);
        timelineTbody.appendChild(tr);
      }
    });

    timelineOverlay.classList.add('open');
  }
